name: workflow
description: "Spec-driven AI development workflow with Claude Code commands"
version: 1.0.0
tags: [workflow, specs, commands]
provides: [spec-workflow, claude-commands, team-templates]
conflicts: []
context:
  - context/workflow.md
commands:
  - commands/brd.md
  - commands/spec.md
  - commands/approve.md
  - commands/implement.md
  - commands/review.md
  - commands/breakdown.md
  - commands/checkpoint.md
  - commands/rollback.md
  - commands/build-with-team.md
  - commands/refresh-context.md
  - commands/test.md
  - commands/test-plan.md
  - commands/qa-review.md
  - commands/deploy-check.md
  - commands/new-module.md
  - commands/project-status.md
  - commands/rfp.md
  - commands/orchestrate.md
hooks:
  - src: hooks/session-start.js
    event: SessionStart
    timeout: 5000
  - src: hooks/session-end.js
    event: Stop
    timeout: 10000
  - src: hooks/config-protection.js
    event: PreToolUse
    matcher: Write
    timeout: 500
  - src: hooks/commit-quality.js
    event: PreToolUse
    matcher: Bash
    timeout: 3000
  - src: hooks/observe.js
    event: PostToolUse
    timeout: 2000
scaffolds:
  - src: scaffolds/INDEX.md
    dest: .agentctx/specs/INDEX.md
  - src: scaffolds/feature-spec-template.md
    dest: .agentctx/specs/_templates/feature-spec.md
  - src: scaffolds/backend-spec-template.md
    dest: .agentctx/specs/_templates/backend-spec.md
  - src: scaffolds/frontend-spec-template.md
    dest: .agentctx/specs/_templates/frontend-spec.md
  - src: scaffolds/mobile-spec-template.md
    dest: .agentctx/specs/_templates/mobile-spec.md
  - src: scaffolds/qa-spec-template.md
    dest: .agentctx/specs/_templates/qa-spec.md
  - src: scaffolds/devops-spec-template.md
    dest: .agentctx/specs/_templates/devops-spec.md
  - src: scaffolds/brd-template.md
    dest: .agentctx/specs/_templates/brd-template.md
